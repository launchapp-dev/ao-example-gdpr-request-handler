default_workflow_ref: process-request

workflows:
  - id: process-request
    name: "Process Data Subject Request"
    description: "Full GDPR/CCPA DSR lifecycle: validate → classify → locate data → generate plan → audit trail"
    phases:
      - validate-request
      - classify-request
      - locate-data
      - review-completeness:
          on_verdict:
            rework:
              target: locate-data
          max_rework_attempts: 2
      - generate-plan
      - generate-audit-trail
      - record-completion
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: false
        auto_merge: false
        cleanup_worktree: true

  - id: deadline-monitor
    name: "GDPR Deadline Monitor"
    description: "Daily scan of all open DSRs against regulatory deadlines — flags at-risk and overdue requests"
    phases:
      - scan-deadlines
      - assess-risk
      - generate-alerts

  - id: compliance-report
    name: "Weekly Compliance Report"
    description: "Weekly compliance analytics and DPO dashboard — metrics, trends, and regulatory posture"
    phases:
      - aggregate-metrics
      - generate-dashboard
